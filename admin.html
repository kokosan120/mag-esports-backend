<div class="admin-form" style="max-width: 500px; margin: 50px auto; background: #111; padding: 30px; border-radius: 20px;">
    <h2>CREATE LOBBY</h2>
    <input type="text" id="n" placeholder="Lobby Name">
    <input type="text" id="m" placeholder="Mode (Squad)">
