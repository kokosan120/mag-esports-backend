<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAG ESPORTS | Automated Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: #0d0d12; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #16161e; width: 90%; max-width: 400px; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; border: 1px solid #2a2a35; }
        .logo { width: 120px; border-radius: 12px; margin-bottom: 10px; }
        h2 { margin: 0; font-weight: 800; background: linear-gradient(90deg, #ff416c, #ff4b2b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #8a8a9e; font-size: 12px; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #20202b; border: 1px solid #323242; border-radius: 8px; color: #fff; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: 0.3s; text-decoration: none; display: inline-block; box-sizing: border-box; }
        .btn-pay { background: #0072ff; color: #fff; margin-bottom: 15px; }
        .btn-submit { background: #ff416c; color: #fff; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .divider { margin: 20px 0; border-top: 1px solid #323242; position: relative; }
        .divider span { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #16161e; padding: 0 10px; font-size: 10px; color: #6c6c80; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.jpg" alt="MAG ESPORTS" class="logo">
        <h2>MAG ESPORTS</h2>
        <p>FIRST EVER AUTOMATED BOOKING FACILITY</p>

        <input type="text" id="teamName" placeholder="Team Name">
        <input type="password" id="secretToken" placeholder="Create Password">

        <a href="upi://pay?pa=yourupi@bank&pn=MAGESPORTS&am=50.00&cu=INR" class="btn btn-pay">Pay ₹50 via UPI App</a>

        <div class="divider"><span>AFTER PAYMENT</span></div>

        <input type="text" id="utr" placeholder="Enter 12-Digit UTR">
        <button class="btn btn-submit" onclick="registerTeam()">Verify & Register</button>
    </div>

    <script>
        // Aapka Live Render Link
        const backendUrl = "https://mag-esports-backend.onrender.com";

        async function registerTeam() {
            const teamName = document.getElementById('teamName').value;
            const secretToken = document.getElementById('secretToken').value;
            const utrNumber = document.getElementById('utr').value;

            if(!teamName || !secretToken || !utrNumber) return alert("All fields are required!");

            try {
                const res = await fetch(`${backendUrl}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ teamName, secretToken, utrNumber })
                });
                const data = await res.json();
                alert(data.message);
            } catch (err) {
                alert("Server Connection Error!");
            }
        }
    </script>
</body>
</html>
